<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Robyn Admin Login Page</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#137fec",
          "background-light": "#f6f7f8",
          "background-dark": "#101922",
        },
        fontFamily: {
          "display": ["Inter"]
        },
        borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
      },
    },
  }
</script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col items-center justify-center">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden" style="--checkbox-tick-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(255,255,255)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3cpath d=%27M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z%27/%3e%3c/svg%3e');">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 md:px-40 flex flex-1 justify-center py-10 md:py-20">
<div class="layout-content-container flex flex-col max-w-[480px] w-full flex-1 bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-slate-200 dark:border-slate-800 p-8">
<!-- Header / Logo -->
<div class="flex items-center justify-center gap-4 mb-8">
<div class="size-10 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M44 11.2727C44 14.0109 39.8386 16.3957 33.69 17.6364C39.8386 18.877 44 21.2618 44 24C44 26.7382 39.8386 29.123 33.69 30.3636C39.8386 31.6043 44 33.9891 44 36.7273C44 40.7439 35.0457 44 24 44C12.9543 44 4 40.7439 4 36.7273C4 33.9891 8.16144 31.6043 14.31 30.3636C8.16144 29.123 4 26.7382 4 24C4 21.2618 8.16144 18.877 14.31 17.6364C8.16144 16.3957 4 14.0109 4 11.2727C4 7.25611 12.9543 4 24 4C35.0457 4 44 7.25611 44 11.2727Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-white text-2xl font-bold leading-tight tracking-tight">Robyn Admin</h2>
</div>
<div class="flex flex-col gap-2 items-center mb-8">
<p class="text-slate-900 dark:text-white text-xl font-semibold leading-tight text-center">Welcome Back</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal text-center">Sign in to access your admin dashboard</p>
</div>
<form class="flex flex-col gap-4">
<label class="flex flex-col w-full">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal mb-2">Username</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-base font-normal leading-normal" placeholder="Enter your username" type="text" value=""/>
</label>
<label class="flex flex-col w-full">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal mb-2">Password</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-base font-normal leading-normal" placeholder="Enter your password" type="password" value=""/>
</label>
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-3 cursor-pointer">
<input class="h-5 w-5 rounded border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-primary checked:bg-primary checked:border-primary focus:ring-primary focus:ring-offset-background-light dark:focus:ring-offset-background-dark" type="checkbox"/>
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium">Remember me</span>
</label>
<a class="text-primary text-sm font-medium hover:underline" href="#">Forgot password?</a>
</div>
<button class="mt-6 flex items-center justify-center rounded-lg bg-primary h-12 px-6 text-white text-base font-semibold leading-normal hover:bg-primary/90 transition-colors w-full" type="submit">
            Log in
          </button>
</form>
<div class="mt-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">Don't have an account? <a class="text-primary font-medium hover:underline" href="#">Contact Administrator</a></p>
</div>
</div>
</div>
</div>
</div>
</body></html>
