apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    isDefault: false
    version: 1
    editable: false
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: "2.53.0"
      timeInterval: 15s
      cacheLevel: High
      incrementalQuerying: true
      incrementalQueryOverlapWindow: 10m
